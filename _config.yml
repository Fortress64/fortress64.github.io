remote_theme: chrisrhymes/bulma-clean-theme@v1.0.0

lang: en
title: Fortress64
description: Securing Your Digital Privacy.
url: "https://fortress64.github.io/"
permalink: pretty

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      hero_height: is-fullwidth
      
navbar_logo: /img/logos/Fortress64.webp
navbar_logo_alt: Fortress64

fixed_navbar: top
force_theme: light

social:
  threads: https://www.threads.net/
  youtube: https://www.youtube.com/@Fortress64

footer_menu: footer_menu

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from
